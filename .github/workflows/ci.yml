name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web (lint + typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: pnpm --filter web lint
      - run: pnpm --filter web typecheck
      - run: pnpm --filter web build
        env:
          AUTH_SECRET: ci-secret
          WEB_DATABASE_URL: postgresql://hermes:hermes@localhost:5432/hermes

  python:
    name: python (ruff + pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - package: hermes-api
            dir: apps/api
          - package: hermes-worker
            dir: apps/worker
          - package: hermes-playwright
            dir: apps/playwright
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.14"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --package ${{ matrix.package }}
      - run: uv run --package ${{ matrix.package }} ruff check ${{ matrix.dir }}
      - run: uv run --package ${{ matrix.package }} pytest ${{ matrix.dir }}/tests
