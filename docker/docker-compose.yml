name: hermes

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes
      POSTGRES_DB: hermes
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes -d hermes"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/hermes || true
      "
    restart: "no"

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  migrate:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://hermes:hermes@postgres:5432/hermes
      DATABASE_URL_SYNC: postgresql://hermes:hermes@postgres:5432/hermes
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../apps/api:/app/apps/api
    working_dir: /app/apps/api
    command: ["uv", "run", "alembic", "upgrade", "head"]
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://hermes:hermes@postgres:5432/hermes
      DATABASE_URL_SYNC: postgresql://hermes:hermes@postgres:5432/hermes
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CORS_ORIGINS: http://localhost:3100
      PLAYWRIGHT_SERVICE_URL: ${PLAYWRIGHT_SERVICE_URL:-http://playwright:8001}
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - ../apps/api:/app/apps/api
      - api_uv_cache:/root/.cache/uv

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://hermes:hermes@postgres:5432/hermes
      DATABASE_URL_SYNC: postgresql://hermes:hermes@postgres:5432/hermes
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PLAYWRIGHT_SERVICE_URL: ${PLAYWRIGHT_SERVICE_URL:-http://playwright:8001}
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ../apps/worker:/app/apps/worker
      - ../apps/api:/app/apps/api

  playwright:
    build:
      context: ..
      dockerfile: apps/playwright/Dockerfile
    env_file: ../.env
    environment:
      BEM_TE_VI_PROFILE_DIR: /app/bem_te_vi_profile
    ports:
      - "8001:8001"
    volumes:
      - ../apps/playwright:/app/apps/playwright
      - ../bem_te_vi_profile:/app/bem_te_vi_profile

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    env_file: ../.env
    environment:
      WEB_DATABASE_URL: postgresql://hermes:hermes@postgres:5432/hermes
      NEXTAUTH_URL: http://localhost:3100
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      API_BASE_URL: http://api:8000
      HERMES_API_URL: http://api:8000
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
      api:
        condition: service_started
    ports:
      - "3100:3000"
    volumes:
      - ../apps/web:/app/apps/web
      - ../packages:/app/packages
      - web_node_modules:/app/apps/web/node_modules
      - web_root_node_modules:/app/node_modules

volumes:
  pg_data:
  minio_data:
  api_uv_cache:
  web_node_modules:
  web_root_node_modules:
